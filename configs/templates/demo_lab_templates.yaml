feature_templates:
  - name: "DEMO-LAB-SYSTEM"
    description: "Demo lab system feature template - NTP/Timezone/Logging"
    template_type: "cisco_system"
    device_type: ["vedge-C8000V"]
    definition:
      site_id: "{{site_id}}"
      system_ip: "{{system_ip}}"
      hostname: "{{hostname}}"
      timezone: "Asia/Seoul"
      console_baud_rate: "9600"
      max_omp_sessions: 2

  - name: "DEMO-LAB-NTP"
    description: "Demo lab NTP server template"
    template_type: "cisco_ntp"
    device_type: ["vedge-C8000V"]
    definition:
      server:
        - name: "time.google.com"
          prefer: true
        - name: "time.cloudflare.com"
          prefer: false

  - name: "DEMO-LAB-LOGGING"
    description: "Demo lab syslog server template"
    template_type: "cisco_logging"
    device_type: ["vedge-C8000V"]
    definition:
      server:
        - name: "10.10.10.100"
          vpn_id: 512
          priority: "informational"

  - name: "DEMO-LAB-VPN0-TRANSPORT"
    description: "Demo lab transport VPN"
    template_type: "cisco_vpn"
    device_type: ["vedge-C8000V"]
    definition:
      vpn_id: 0
      name: "Transport-Demo"

  - name: "DEMO-LAB-VPN0-INTERFACE"
    description: "Demo lab transport interface"
    template_type: "cisco_vpn_interface"
    device_type: ["vedge-C8000V"]
    definition:
      if_name: "{{transport_if_name}}"
      ip_address: "{{transport_ip}}"
      tunnel_interface:
        color: "{{wan_color}}"
        allow_service:
          - dhcp
          - dns
          - icmp
          - netconf
          - ssh

device_templates:
  - name: "DEMO-LAB-DEVICE-TEMPLATE"
    description: "Demo lab device template for CI/CD pipeline demonstration"
    device_type: "vedge-C8000V"
    feature_templates:
      - "DEMO-LAB-SYSTEM"
      - "DEMO-LAB-NTP"
      - "DEMO-LAB-LOGGING"
      - "DEMO-LAB-VPN0-TRANSPORT"
      - "DEMO-LAB-VPN0-INTERFACE"
