name: SD-WAN Terraform Pipeline

on:
  push:
    branches: [main]
    paths: ['terraform/**']
  pull_request:
    branches: [main]
    paths: ['terraform/**']

env:
  TF_VERSION: '1.5'
  TF_WORKING_DIR: terraform

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  plan:
    name: Terraform Plan
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        env:
          SDWAN_URL: ${{ secrets.VMANAGE_URL }}
          SDWAN_USERNAME: ${{ secrets.VMANAGE_USERNAME }}
          SDWAN_PASSWORD: ${{ secrets.VMANAGE_PASSWORD }}
        run: terraform init

      - name: Terraform Plan
        env:
          SDWAN_URL: ${{ secrets.VMANAGE_URL }}
          SDWAN_USERNAME: ${{ secrets.VMANAGE_USERNAME }}
          SDWAN_PASSWORD: ${{ secrets.VMANAGE_PASSWORD }}
        run: terraform plan -var-file=environments/lab/lab.tfvars -no-color -out=tfplan

      - name: Post Plan to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let planOutput = '';
            try {
              planOutput = execSync('terraform show -no-color tfplan', {
                cwd: '${{ env.TF_WORKING_DIR }}',
                encoding: 'utf-8',
                maxBuffer: 1024 * 1024
              });
            } catch (e) {
              planOutput = 'Plan output unavailable';
            }
            const body = `### Terraform Plan Output
            \`\`\`
            ${planOutput.substring(0, 60000)}
            \`\`\``;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

  apply:
    name: Terraform Apply
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        env:
          SDWAN_URL: ${{ secrets.VMANAGE_URL }}
          SDWAN_USERNAME: ${{ secrets.VMANAGE_USERNAME }}
          SDWAN_PASSWORD: ${{ secrets.VMANAGE_PASSWORD }}
        run: terraform init

      - name: Terraform Apply
        if: ${{ vars.ENABLE_TF_APPLY == 'true' }}
        env:
          SDWAN_URL: ${{ secrets.VMANAGE_URL }}
          SDWAN_USERNAME: ${{ secrets.VMANAGE_USERNAME }}
          SDWAN_PASSWORD: ${{ secrets.VMANAGE_PASSWORD }}
        run: terraform apply -var-file=environments/lab/lab.tfvars -auto-approve
