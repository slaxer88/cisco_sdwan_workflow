name: SD-WAN Terraform Pipeline

on:
  push:
    branches: [main]
    paths: ['terraform/**']
  pull_request:
    branches: [main]
    paths: ['terraform/**']

env:
  TF_VERSION: '1.5'
  TF_WORKING_DIR: terraform

jobs:
  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  plan:
    name: Terraform Plan
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        env:
          SDWAN_URL: ${{ secrets.VMANAGE_URL }}
          SDWAN_USERNAME: ${{ secrets.VMANAGE_USERNAME }}
          SDWAN_PASSWORD: ${{ secrets.VMANAGE_PASSWORD }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        env:
          SDWAN_URL: ${{ secrets.VMANAGE_URL }}
          SDWAN_USERNAME: ${{ secrets.VMANAGE_USERNAME }}
          SDWAN_PASSWORD: ${{ secrets.VMANAGE_PASSWORD }}
        run: |
          terraform plan -var-file=environments/lab/lab.tfvars -no-color -out=tfplan 2>&1 | tee /tmp/plan.txt
          SUMMARY=$(grep -E "^Plan:|^No changes" /tmp/plan.txt || echo "Plan completed")
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"

      - name: Post Plan to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let planOutput = '';
            try {
              planOutput = execSync('terraform show -no-color tfplan', {
                cwd: '${{ env.TF_WORKING_DIR }}',
                encoding: 'utf-8',
                maxBuffer: 1024 * 1024
              });
            } catch (e) {
              planOutput = 'Plan output unavailable';
            }
            const body = `### Terraform Plan Output
            \`\`\`
            ${planOutput.substring(0, 60000)}
            \`\`\``;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Notify Webex (Plan)
        if: always()
        env:
          WEBEX_TOKEN: ${{ secrets.WEBEX_TOKEN }}
          WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
        run: |
          STATUS="${{ steps.plan.outcome }}"
          ICON=$( [ "$STATUS" = "success" ] && echo "📋" || echo "❌" )
          curl -s -X POST "https://webexapis.com/v1/messages" \
            -H "Authorization: Bearer $WEBEX_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "roomId": "$WEBEX_ROOM_ID",
            "markdown": "$ICON **SD-WAN Terraform Plan**\n\n- **PR**: #${{ github.event.number }} by ${{ github.actor }}\n- **결과**: ${STATUS}\n- **요약**: ${{ steps.plan.outputs.summary }}\n- **시간**: $(date -u '+%Y-%m-%d %H:%M UTC')\n- **링크**: ${{ github.event.pull_request.html_url }}"
          }
          EOF
          )"

  apply:
    name: Terraform Apply
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        env:
          SDWAN_URL: ${{ secrets.VMANAGE_URL }}
          SDWAN_USERNAME: ${{ secrets.VMANAGE_USERNAME }}
          SDWAN_PASSWORD: ${{ secrets.VMANAGE_PASSWORD }}
        run: terraform init

      - name: Terraform Apply
        id: apply
        if: ${{ vars.ENABLE_TF_APPLY == 'true' }}
        env:
          SDWAN_URL: ${{ secrets.VMANAGE_URL }}
          SDWAN_USERNAME: ${{ secrets.VMANAGE_USERNAME }}
          SDWAN_PASSWORD: ${{ secrets.VMANAGE_PASSWORD }}
        run: |
          terraform apply -var-file=environments/lab/lab.tfvars -auto-approve -no-color 2>&1 | tee /tmp/apply.txt
          SUMMARY=$(grep -E "^Apply complete|^Error" /tmp/apply.txt | head -1 || echo "Apply completed")
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"

      - name: Notify Webex (Apply)
        if: always() && steps.apply.outcome != 'skipped'
        env:
          WEBEX_TOKEN: ${{ secrets.WEBEX_TOKEN }}
          WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
        run: |
          STATUS="${{ steps.apply.outcome }}"
          ICON=$( [ "$STATUS" = "success" ] && echo "✅" || echo "🚨" )
          COMMIT_MSG=$(git log -1 --format='%s' 2>/dev/null || echo "N/A")
          curl -s -X POST "https://webexapis.com/v1/messages" \
            -H "Authorization: Bearer $WEBEX_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "roomId": "$WEBEX_ROOM_ID",
            "markdown": "$ICON **SD-WAN Terraform Apply**\n\n- **적용자**: ${{ github.actor }}\n- **결과**: ${STATUS}\n- **변경내용**: ${COMMIT_MSG}\n- **요약**: ${{ steps.apply.outputs.summary }}\n- **시간**: $(date -u '+%Y-%m-%d %H:%M UTC')\n- **커밋**: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
          }
          EOF
          )"
