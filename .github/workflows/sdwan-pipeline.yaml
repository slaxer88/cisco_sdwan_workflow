name: SD-WAN CI/CD Pipeline

on:
  push:
    branches: [main]
    paths: ['configs/**']
  pull_request:
    branches: [main]
    paths: ['configs/**']

env:
  PYTHON_VERSION: '3.12'

jobs:
  validate:
    name: Validate Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint YAML
        run: python -m pipeline.validate configs

      - name: Run unit tests
        run: pytest tests/ -v

  plan:
    name: Plan Changes
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e .

      - name: Generate plan (local)
        run: python -m pipeline.cli --config-dir configs plan --local

      - name: Generate plan (remote)
        if: ${{ vars.ENABLE_REMOTE_PLAN == 'true' }}
        env:
          VMANAGE_URL: ${{ secrets.VMANAGE_URL }}
          VMANAGE_USERNAME: ${{ secrets.VMANAGE_USERNAME }}
          VMANAGE_PASSWORD: ${{ secrets.VMANAGE_PASSWORD }}
          VMANAGE_PORT: ${{ secrets.VMANAGE_PORT }}
        run: python -m pipeline.cli --config-dir configs plan

  deploy:
    name: Deploy to vManage
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e .

      - name: Deploy (dry-run)
        run: python -m pipeline.cli --config-dir configs deploy --dry-run

      - name: Deploy to vManage
        id: deploy
        if: ${{ vars.ENABLE_DEPLOY == 'true' }}
        env:
          VMANAGE_URL: ${{ secrets.VMANAGE_URL }}
          VMANAGE_USERNAME: ${{ secrets.VMANAGE_USERNAME }}
          VMANAGE_PASSWORD: ${{ secrets.VMANAGE_PASSWORD }}
          VMANAGE_PORT: ${{ secrets.VMANAGE_PORT }}
        run: python -m pipeline.cli --config-dir configs deploy --auto-approve

      - name: Notify Webex (Deploy)
        if: always() && steps.deploy.outcome != 'skipped'
        env:
          WEBEX_TOKEN: ${{ secrets.WEBEX_TOKEN }}
          WEBEX_ROOM_ID: ${{ secrets.WEBEX_ROOM_ID }}
        run: |
          STATUS="${{ steps.deploy.outcome }}"
          ICON=$( [ "$STATUS" = "success" ] && echo "✅" || echo "🚨" )
          COMMIT_MSG=$(git log -1 --format='%s' 2>/dev/null || echo "N/A")
          curl -s -X POST "https://webexapis.com/v1/messages" \
            -H "Authorization: Bearer $WEBEX_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "roomId": "$WEBEX_ROOM_ID",
            "markdown": "$ICON **SD-WAN Python Deploy**\n\n- **적용자**: ${{ github.actor }}\n- **결과**: ${STATUS}\n- **변경내용**: ${COMMIT_MSG}\n- **시간**: $(date -u '+%Y-%m-%d %H:%M UTC')\n- **커밋**: [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
          }
          EOF
          )"
